<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Javier Zarracina | CV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #f4f4f4;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #111;
    }

    .wrapper {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
      text-align: center;
    }

    h1 {
      font-weight: 600;
      margin-bottom: 8px;
    }

    .links {
      margin-bottom: 30px;
      font-size: 15px;
    }

    .links a {
      color: #0a66c2;
      text-decoration: none;
      margin: 0 10px;
      font-weight: 500;
    }

    .links a:hover {
      text-decoration: underline;
    }

    .download-btn {
      display: inline-block;
      margin: 20px 0 40px 0;
      padding: 12px 22px;
      background: #111;
      color: white;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 0.5px;
      border-radius: 4px;
      transition: background 0.2s ease;
    }

    .download-btn:hover {
      background: #333;
    }

    .pdf-container {
      background: white;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    iframe {
      width: 100%;
      height: 1100px;
      border: none;
    }

    @media (max-width: 768px) {
      iframe {
        height: 800px;
      }
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <h1>Javier Zarracina</h1>

    <div class="links">
      <a href="https://www.linkedin.com/in/YOUR-LINK" target="_blank">LinkedIn</a>
      |
      <a href="https://yourportfolio.com" target="_blank">Portfolio</a>
    </div>

    <a class="download-btn" href="cv.pdf" download>
      Download PDF
    </a>

    <div class="pdf-container">
      <iframe src="cv.pdf"></iframe>
    </div>

  </div>
</body>
</html>
